$kind: http-request
name: 'Upload File'
method: POST
url: '{{base_url}}/files/upload'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{access_token}}'
body:
  type: formdata
  content:
    - key: file
      type: file
      src: ''
      description: 'Upload a file.'
