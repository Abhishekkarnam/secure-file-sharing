<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SecureShare</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <nav>
        <div class="nav-logo"><strong>SECURE_FS</strong></div>
        <div class="nav-links">
            <a href="dashboard.html" class="active">Dashboard</a>
            <a href="upload.html">Upload File</a>
            <a href="files.html">My Files</a>
            <a href="attack.html">Attack Simulation</a>
            <a href="logs.html" id="nav-logs" style="display:none;">Admin Logs</a>
            <a href="#" onclick="logout()" style="color: var(--error); margin-left: 20px;">Logout</a>
        </div>
    </nav>

    <div class="container">
        <header style="margin-bottom: 2rem;">
            <h1 id="user-welcome">Loading...</h1>
            <p style="color: var(--text-dim);">System Status: <span style="color: var(--accent);">● Encrypted & Operational</span></p>
        </header>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
            <div class="card">
                <h3>Quick Stats</h3>
                <p>Files Shared: <strong>12</strong></p>
                <p>Threats Blocked: <strong style="color: var(--accent);">45</strong></p>
                <button onclick="location.href='files.html'">View My Files</button>
            </div>
            <div class="card">
                <h3>Security Tip</h3>
                <p style="font-style: italic; color: var(--text-dim);">"Always verify the recipient's identity before sharing sensitive encrypted keys."</p>
                <button onclick="location.href='attack.html'" style="background: var(--secondary);">Run Diagnostics</button>
            </div>
        </div>
    </div>
    <script src="../static/script.js"></script>
</body>
</html>
