<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureShare | Login</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <div class="container" style="max-width: 450px; margin-top: 10vh;">
        <div class="card">
            <div style="text-align: center; margin-bottom: 2rem;">
                <h1 style="color: var(--primary); margin-bottom: 0;">🛡️ SecureShare</h1>
                <p style="color: var(--text-dim);">File Protection & Attack Simulation</p>
            </div>
            
            <div id="error-msg" class="alert error"></div>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
                
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
                
                <button type="submit" style="width: 100%; margin-top: 1.5rem; font-weight: bold;">
                    AUTHENTICATE
                </button>
            </form>
            
            <p style="text-align: center; font-size: 0.8rem; color: var(--text-dim); margin-top: 2rem;">
                Authorized Personnel Only. All actions are logged.
            </p>
        </div>
    </div>
    <script src="../static/script.js"></script>
</body>
</html>
