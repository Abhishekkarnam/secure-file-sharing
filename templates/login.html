<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureShare | Login</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <main class="auth-wrap">
        <section class="auth-panel">
            <div class="auth-brand">
                <p class="eyebrow">Protected Access</p>
                <h1>SecureShare Control</h1>
                <p>Sign in to manage encrypted files, inspect vault activity, and run validation scenarios from the refreshed interface.</p>
            </div>

            <div id="error-msg" class="alert error"></div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="field">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username" required>
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>

                <button type="submit" style="width: 100%; margin-top: 8px;">Authenticate</button>
            </form>

            <p class="helper-text" style="margin-top: 18px;">Authorized personnel only. Sessions use protected routes and every major action should remain auditable.</p>
        </section>
    </main>
    <script src="../static/script.js"></script>
</body>
</html>
